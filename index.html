<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Origynl · Proof-of-Origin Ledger</title>

    <meta name="description" content="A forensic ledger for originals. Inscribe a file's fingerprint to a public blockchain and prove when it existed, unchanged." />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Origynl" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Fonts: Instrument Serif, IBM Plex Sans, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- No-FOUC theme bootstrap -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('origynl.theme') || 'dark';
          var accent = localStorage.getItem('origynl.accent') || 'orange';
          var density = localStorage.getItem('origynl.density') || 'comfy';
          document.documentElement.setAttribute('data-theme', theme);
          var accentMap = {
            orange: ['oklch(0.72 0.17 55)', 'oklch(0.72 0.17 55 / 0.1)'],
            blue: ['oklch(0.70 0.17 250)', 'oklch(0.70 0.17 250 / 0.1)'],
            green: ['oklch(0.78 0.18 150)', 'oklch(0.78 0.18 150 / 0.1)'],
            mono: ['oklch(0.8 0 0)', 'oklch(0.8 0 0 / 0.1)'],
          };
          var pair = accentMap[accent] || accentMap.orange;
          document.documentElement.style.setProperty('--seal', pair[0]);
          document.documentElement.style.setProperty('--seal-wash', pair[1]);
          document.documentElement.style.setProperty('--grid', density === 'dense' ? '6px' : '8px');
        } catch (e) {}
      })();
    </script>

    <script type="importmap">
      {
        "imports": {
          "viem": "https://aistudiocdn.com/viem@^2.40.3",
          "viem/": "https://aistudiocdn.com/viem@^2.40.3/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "pdf-lib": "https://aistudiocdn.com/pdf-lib@^1.17.1",
          "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
          "react-webcam": "https://aistudiocdn.com/react-webcam@^7.2.0",
          "piexifjs": "https://aistudiocdn.com/piexifjs@^1.0.6"
        }
      }
    </script>
  </head>
  <body class="grain">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) { console.log('SW registered:', reg.scope); })
            .catch(function (err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
